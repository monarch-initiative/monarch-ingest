name: 'hgnc_symbol_2_id'

metadata:
  description: 'Mapping HGNC Gene Symbols to their corresponding HGNC Identifiers'

format: 'csv'

delimiter: '\t'

#  http://ftp.ebi.ac.uk/pub/databases/genenames/hgnc/tsv/hgnc_complete_set.txt
files:
  - './data/hgnc/hgnc_complete_set.txt'

header: 0

columns:
  - hgnc_id
  - symbol
  - name
  - locus_group
  - locus_type
  - status
  - location
  - location_sortable
  - alias_symbol
  - alias_name
  - prev_symbol
  - prev_name
  - gene_group
  - gene_group_id
  - date_approved_reserved
  - date_symbol_changed
  - date_name_changed
  - date_modified
  - entrez_id
  - ensembl_gene_id
  - vega_id
  - ucsc_id
  - ena
  - refseq_accession
  - ccds_id
  - uniprot_ids
  - pubmed_id
  - mgd_id
  - rgd_id
  - lsdb
  - cosmic
  - omim_id
  - mirbase
  - homeodb
  - snornabase
  - bioparadigms_slc
  - orphanet
  - pseudogene.org
  - horde_id
  - merops
  - imgt
  - iuphar
  - kznf_gene_catalog
  - mamit-trnadb
  - cd
  - lncrnadb
  - enzyme_id
  - intermediate_filament_db
  - rna_central_ids
  - lncipedia
  - gtrnadb
  - agr
  - mane_select
  - gencc

key: 'hgnc_id'

values:
  - 'symbol'
